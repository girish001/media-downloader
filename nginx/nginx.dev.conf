# ══════════════════════════════════════════════════════════════════
#  nginx/nginx.dev.conf  — MediaProc Development Reverse Proxy
#
#  Routes:
#    /              → frontend  (Next.js :3000)
#    /api/*         → backend   (Fastify :4000)
#    /health        → backend   (health probe)
#    /docs          → backend   (Swagger UI)
#    /admin/queues  → backend   (Bull Board)
#    /_next/        → frontend  (Next.js assets)
# ══════════════════════════════════════════════════════════════════

worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    # Simple access log for dev
    log_format dev '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log dev;

    sendfile       on;
    tcp_nopush     on;
    keepalive_timeout 65;
    client_max_body_size 16m;

    # Gzip
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 4;
    gzip_types      text/plain text/css text/javascript application/json
                    application/javascript image/svg+xml;

    # ── Upstream services ────────────────────────────────────────
    upstream backend {
        server backend:4000;
        keepalive 16;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }

    # ── Dev server (HTTP only) ───────────────────────────────────
    server {
        listen      80;
        server_name localhost;

        # ── Health check (nginx itself) ──────────────────────────
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ── Backend API ──────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── Health / readiness probes ────────────────────────────
        location ~ ^/(health|ready)$ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            access_log         off;
        }

        # ── Swagger docs ─────────────────────────────────────────
        location /docs {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Bull Board queue monitor ──────────────────────────────
        location /admin/queues {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Next.js static assets (long cache) ───────────────────
        location /_next/static/ {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;

            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # ── Frontend (all other requests) ───────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # WebSocket support for Next.js HMR
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }
    }
}
